<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميسار | Mesar</title>
    <style>
        :root { --p: #25D366; --bg: #0f172a; --c: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--c); width: 340px; border-radius: 30px; padding: 40px 20px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-top: 5px solid var(--p); }
        .logo-box { width: 110px; height: 110px; background: #000; border-radius: 50%; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; border: 4px solid var(--c); overflow: hidden; }
        .logo-box img { width: 100%; height: 100%; object-fit: contain; }
        h1 { font-size: 26px; margin: 10px 0; }
        .status { background: rgba(37, 211, 102, 0.15); color: var(--p); padding: 6px 20px; border-radius: 50px; font-weight: bold; font-size: 14px; margin-bottom: 30px; display: inline-block; }
        .btn { display: block; padding: 16px; margin: 12px 0; border-radius: 15px; text-decoration: none; font-weight: 800; font-size: 17px; }
        .wa { background: var(--p); color: black; }
        .fb { background: #1877f2; color: white; }
        .qr-section { background: white; padding: 10px; border-radius: 20px; display: inline-block; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-box">
            <img src="https://i.ibb.co/vzP4z4V/mesar-logo-white.png" alt="Mesar">
        </div>
        <h1>ميسار | Mesar</h1>
        <div class="status">الاشتراك نشط ✅</div>
        <a href="https://wa.me/201234567890" class="btn wa">تواصل واتساب</a>
        <a href="#" class="btn fb">صفحة الفيسبوك</a>
        <div class="qr-section">
            <img id="qr" src="" width="130">
        </div>
    </div>
    <script>
        document.getElementById('qr').src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + window.location.href;
    </script>
</body>
</html>
